# Taxonomía de categorías. Inspirada en Plaid PFC + ajustes AR.
# Estas son las seed: el usuario puede agregar/editar/borrar las suyas desde la UI.
# Las seed no se pueden borrar (is_user_created=false) para no romper reglas.

