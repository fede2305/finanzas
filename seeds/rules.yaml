# Reglas seed para auto-categorizar merchants AR comunes.
# Formato: match_type ∈ {exact, contains, regex}; pattern es case-insensitive.
# El categorizer prueba en orden: exact > contains > regex. La regla más específica gana.
# El usuario puede agregar más desde el "review inbox" (esas se guardan en DB con source='learned').

rules:
  # ============== COMIDA ==============
  - { match_type: contains, pattern: "carrefour",          category: "Comida", subcategory: "Supermercado" }
  - { match_type: contains, pattern: "coto",               category: "Comida", subcategory: "Supermercado" }
  - { match_type: contains, pattern: "dia ",               category: "Comida", subcategory: "Supermercado" }
  - { match_type: contains, pattern: "jumbo",              category: "Comida", subcategory: "Supermercado" }
  - { match_type: contains, pattern: "vea",                category: "Comida", subcategory: "Supermercado" }
  - { match_type: contains, pattern: "supermercado",       category: "Comida", subcategory: "Supermercado" }
  - { match_type: contains, pattern: "express deheza",     category: "Comida", subcategory: "Supermercado" }
  - { match_type: contains, pattern: "rappipro",           category: "Suscripciones", subcategory: "Otros" }
  - { match_type: contains, pattern: "rappi",              category: "Comida", subcategory: "Delivery" }
  - { match_type: contains, pattern: "pedidosya",          category: "Comida", subcategory: "Delivery" }
  - { match_type: contains, pattern: "comidaspatio",       category: "Comida", subcategory: "Restaurante" }
  - { match_type: contains, pattern: "la payada",          category: "Comida", subcategory: "Restaurante" }
  - { match_type: contains, pattern: "burger",             category: "Comida", subcategory: "Restaurante" }
  - { match_type: contains, pattern: "lucciano",           category: "Comida", subcategory: "Café/Bar" }
  - { match_type: contains, pattern: "the kitchen",        category: "Comida", subcategory: "Restaurante" }
  - { match_type: contains, pattern: "palermo wine",       category: "Comida", subcategory: "Vinería/Bebidas" }
  - { match_type: contains, pattern: "ambarcafe",          category: "Comida", subcategory: "Café/Bar" }
  - { match_type: contains, pattern: "donangel",           category: "Comida", subcategory: "Restaurante" }

  # ============== TRANSPORTE (sin auto) ==============
  - { match_type: contains, pattern: "cabify",             category: "Transporte", subcategory: "Cabify/Uber" }
  - { match_type: contains, pattern: "uber",               category: "Transporte", subcategory: "Cabify/Uber" }
  - { match_type: contains, pattern: "didi",               category: "Transporte", subcategory: "Cabify/Uber" }
  - { match_type: contains, pattern: "sube",               category: "Transporte", subcategory: "SUBE/Transporte público" }

  # ============== AUTO ==============
  - { match_type: contains, pattern: "appypf",             category: "Auto", subcategory: "Combustible" }
  - { match_type: contains, pattern: "ypf",                category: "Auto", subcategory: "Combustible" }
  - { match_type: contains, pattern: "shell",              category: "Auto", subcategory: "Combustible" }
  - { match_type: contains, pattern: "axion",              category: "Auto", subcategory: "Combustible" }
  - { match_type: contains, pattern: "puma energy",        category: "Auto", subcategory: "Combustible" }
  - { match_type: contains, pattern: "autopista",          category: "Auto", subcategory: "Peajes/Autopistas" }
  - { match_type: contains, pattern: "ausa",               category: "Auto", subcategory: "Peajes/Autopistas" }
  - { match_type: contains, pattern: "vtv",                category: "Auto", subcategory: "VTV" }
  - { match_type: contains, pattern: "pat ac",             category: "Auto", subcategory: "Patente" }
  - { match_type: contains, pattern: "estacionamiento",    category: "Auto", subcategory: "Estacionamiento" }
  - { match_type: contains, pattern: "lavadero",           category: "Auto", subcategory: "Lavado" }

  # ============== SERVICIOS ==============
