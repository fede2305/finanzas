<!doctype html>
<html lang="es" class="">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Finanzas · Iniciar sesión</title>
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
  <style>
    :root {
      --bg: oklch(0.985 0.003 250); --surface: oklch(1 0 0);
      --border: oklch(0.922 0.005 255); --ink: oklch(0.24 0.015 260);
      --ink-2: oklch(0.47 0.014 260); --ink-3: oklch(0.62 0.012 260);
      --surface-hover: oklch(0.965 0.005 255);
      --accent: oklch(0.55 0.17 256); --accent-soft: oklch(0.955 0.028 256); --accent-soft-ink: oklch(0.45 0.15 256);
      --ring: oklch(0.55 0.17 256 / 0.40);
      --shadow: 0 8px 30px oklch(0.3 0.03 260 / 0.10), 0 2px 6px oklch(0.3 0.03 260 / 0.06);
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
    }
    .dark {
      --bg: oklch(0.205 0.018 264); --surface: oklch(0.255 0.02 264);
      --border: oklch(0.335 0.022 264); --ink: oklch(0.965 0.004 260);
      --ink-2: oklch(0.74 0.016 260); --ink-3: oklch(0.60 0.016 260);
      --surface-hover: oklch(0.305 0.022 264);
      --accent: oklch(0.62 0.165 256); --accent-soft: oklch(0.34 0.07 256); --accent-soft-ink: oklch(0.85 0.10 256);
      --ring: oklch(0.62 0.165 256 / 0.50);
      --shadow: 0 10px 40px oklch(0 0 0 / 0.45);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 1rem;
      background: var(--bg); color: var(--ink);
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; letter-spacing: -0.011em;
      -webkit-font-smoothing: antialiased;
    }
    /* Soft brand glow behind the card — calm, not neon. */
    body::before { content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background: radial-gradient(60rem 40rem at 50% -10%, var(--accent-soft), transparent 60%); }
    .card { width: 100%; max-width: 23rem; text-align: center; background: var(--surface);
      border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow); padding: 2.5rem 2rem; }
    .logo { display: inline-flex; align-items: center; justify-content: center; width: 3rem; height: 3rem;
      border-radius: 14px; background: var(--accent-soft); color: var(--accent-soft-ink); font-size: 1.5rem; margin-bottom: 1.1rem; }
    h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 0.25rem; }
    .sub { color: var(--ink-3); font-size: 0.875rem; margin: 0 0 1.75rem; }
    .gbtn { display: inline-flex; align-items: center; justify-content: center; gap: 0.65rem; width: 100%;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem;
      font: inherit; font-size: 0.9rem; font-weight: 500; color: var(--ink); cursor: pointer; text-decoration: none;
      transition: background-color 150ms var(--ease-out), border-color 150ms var(--ease-out), transform 130ms var(--ease-out), box-shadow 150ms var(--ease-out); }
    .gbtn:hover { background: var(--surface-hover); border-color: var(--ink-3); }
    .gbtn:active { transform: scale(0.98); }
    .gbtn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--ring); }
    .note { color: var(--ink-3); font-size: 0.75rem; margin-top: 1.5rem; }
    @media (prefers-reduced-motion: reduce) { .gbtn { transition: none; } .gbtn:active { transform: none; } }
  </style>
</head>
<body>
  <main class="card">
    <span class="logo"><i class="ph-fill ph-chart-pie-slice"></i></span>
    <h1>finanzas</h1>
    <p class="sub">Tu dashboard de gastos personales</p>
    <a href="/auth/google" class="gbtn">
      <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continuar con Google
    </a>
    <p class="note">Solo vos podés ver tus datos</p>
  </main>
</body>
</html>
